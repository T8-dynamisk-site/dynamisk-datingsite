<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dating side</title>
    <link rel="stylesheet" href="css/generel.css" />
    <link rel="stylesheet" href="css/opret.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <a href="index.html">
          <img src="img/logo.svg" alt="logo" class="logo" />
        </a>
        <nav class="desktop-menu">
          <a href="profil.html">Profiler</a>
          <a href="filtrering.html">Filter</a>
          <a href="chat.html">Chat</a>
          <a href="opret.html">Opret</a>
        </nav>

        <button class="burger-btn" id="burgerBtn" aria-label="Åbn menu">☰</button>
      </header>

      <nav class="mobile-menu" id="mobileMenu">
        <a href="profil.html">Profiler</a>
        <a href="filtrering.html">Filter</a>
        <a href="chat.html">Chat</a>
        <a href="">Opret</a>
      </nav>
      <main class="main-content">
        <section class="form-card">
          <h1>Opret profil</h1>
          <p>Udfyld dine oplysninger herunder.</p>

          <form class="signup-form" action="#" method="post">
            <div class="form-row">
              <div class="form-group">
                <label for="name">Navn</label>
                <input type="text" id="name" name="name" placeholder="Skriv dit navn" required />
              </div>

              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Skriv din email" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="password">Adgangskode</label>
                <input type="password" id="password" name="password" placeholder="Skriv din adgangskode" required />
              </div>

              <div class="form-group">
                <label for="age">Alder</label>
                <input type="number" id="age" name="age" min="18" max="100" placeholder="Fx 24" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="gender">Køn</label>
                <select id="gender" name="gender" required>
                  <option value="">Vælg køn</option>
                  <option value="kvinde">Kvinde</option>
                  <option value="mand">Mand</option>
                  <option value="andet">Andet</option>
                </select>
              </div>

              <div class="form-group">
                <label for="location">Lokalitet</label>
                <input type="text" id="location" name="location" placeholder="Fx København" required />
              </div>
            </div>

            <div class="criteria-grid">
              <div class="form-group">
                <label for="hair">Hårfarve</label>
                <select id="hair" name="hair">
                  <option value="">Vælg hårfarve</option>
                  <option>Blond</option>
                  <option>Brun</option>
                  <option>Sort</option>
                  <option>Rød</option>
                  <option>Grå</option>
                  <option>Andet</option>
                </select>
              </div>

              <div class="form-group">
                <label for="weight">Vægt</label>
                <input type="number" id="weight" name="weight" min="30" max="250" placeholder="Kg" />
              </div>

              <div class="form-group">
                <label for="eye-color">Øjenfarve</label>
                <select id="eye-color" name="eye-color">
                  <option value="">Vælg øjenfarve</option>
                  <option>Blå</option>
                  <option>Brun</option>
                  <option>Grøn</option>
                  <option>Grå</option>
                  <option>Andet</option>
                </select>
              </div>

              <div class="form-group">
                <label for="height">Højde</label>
                <input type="number" id="height" name="height" min="120" max="230" placeholder="Cm" />
              </div>

              <div class="form-group">
                <label for="blood-type">Blodtype</label>
                <select id="blood-type" name="blood-type">
                  <option value="">Vælg blodtype</option>
                  <option>A+</option>
                  <option>A-</option>
                  <option>B+</option>
                  <option>B-</option>
                  <option>AB+</option>
                  <option>AB-</option>
                  <option>0+</option>
                  <option>0-</option>
                </select>
              </div>
            </div>

            <div class="form-group full-width">
              <label for="bio">Kort beskrivelse</label>
              <textarea id="bio" name="bio" rows="5" placeholder="Skriv lidt om dig selv"></textarea>
            </div>

            <div class="form-actions">
              <button type="submit" class="primary-btn">Opret profil</button>
              <button type="reset" class="secondary-btn">Nulstil</button>
            </div>
          </form>
        </section>
      </main>
      <footer class="footer">
        <img src="img/logo.svg" alt="logo" class="logo" />

        <div class="footer-info">
          <h3>Kontakt</h3>
          <p>Ring til os på +45 12 34 56 78</p>
          <p>Mandag - fredag fra 9-15</p>
          <p>Eller skriv på kontakt@likely.dk</p>
        </div>
      </footer>
    </div>
    <script src="js/opret.js"></script>
  </body>
</html>
