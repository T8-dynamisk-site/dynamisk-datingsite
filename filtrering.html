<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filtrering</title>
    <link rel="stylesheet" href="css/generel.css" />
    <link rel="stylesheet" href="css/filtrering.css" />
    <script src="js/filtrering.js" defer></script>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <a href="index.html">
          <img src="img/logo.svg" alt="logo" class="logo" />
        </a>
        <nav class="desktop-menu">
          <a href="profil.html">Profiler</a>
          <a href="filtrering.html">Filter</a>
          <a href="chat.html">Chat</a>
          <a href="opret.html">Opret</a>
        </nav>

        <button class="burger-btn" id="burgerBtn" aria-label="Åbn menu">☰</button>
      </header>

      <nav class="mobile-menu" id="mobileMenu">
        <a href="profil.html">Profiler</a>
        <a href="filtrering.html">Filter</a>
        <a href="chat.html">Chat</a>
        <a href="opret.html">Opret</a>
      </nav>

      <main class="filtrering">
        <section class="filter-sektion">
          <label class="filter-knap"
            >Hårfarve
            <select id="filter-hårfarve">
              <option value="">Alle</option>
            </select>
          </label>

          <label class="filter-knap"
            >Vægt
            <select id="filter-vægt">
              <option value="">Alle</option>
            </select>
          </label>

          <label class="filter-knap"
            >Øjenfarve
            <select id="filter-øjenfarve">
              <option value="">Alle</option>
            </select>
          </label>

          <label class="filter-knap"
            >Alder
            <select id="filter-alder">
              <option value="">Alle</option>
            </select>
          </label>

          <label class="filter-knap"
            >Højde
            <select id="filter-højde">
              <option value="">Alle</option>
            </select>
          </label>

          <label class="filter-knap"
            >Blodtype
            <select id="filter-blodtype">
              <option value="">Alle</option>
            </select>
          </label>

          <label class="filter-knap"
            >Køn
            <select id="filter-køn">
              <option value="">Alle</option>
            </select>
          </label>

          <label class="filter-knap"
            >Lokalitet
            <select id="filter-lokalitet">
              <option value="">Alle</option>
            </select>
          </label>

          <button class="filter-knap filter-knap--aktiv" id="filtrerKnap">
            Filtrer
            <svg width="17" height="17" viewBox="0 0 55 59" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M3 3H52V9.77153C51.9997 11.4251 51.3541 13.0108 50.2054 14.1799L36.6875 27.9412V49.7647L18.3125 56V29.5L4.5925 14.1362C3.56793 12.9887 3.00016 11.4937 3 9.943V3Z"
                stroke="white"
                stroke-width="6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </section>

        <section class="match-sektion">
          <h2>Dine match</h2>

          <div class="profil-grid" id="profilGrid"></div>
        </section>
      </main>

      <footer class="footer">
        <img src="img/logo.svg" alt="logo" class="logo" />
        <div class="footer-info">
          <h3>Kontakt</h3>
          <p>Ring til os på +45 12 34 56 78</p>
          <p>Mandag - fredag fra 9-15</p>
          <p>Eller skriv på kontakt@likely.dk</p>
        </div>
      </footer>
    </div>

</html>
